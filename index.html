<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion Space - Secure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #09090b, #111827); color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .app-container { width: 100%; max-width: 480px; height: 92vh; min-height: 580px; background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; text-align: center; color: #6366f1; font-weight: 700; margin-bottom: 4px; }
        .subtitle { text-align: center; font-size: 13px; color: #9ca3af; margin-bottom: 20px; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #9ca3af; margin-bottom: 6px; letter-spacing: 0.05em; }
        input, select { width: 100%; padding: 12px; background: #030712; border: 1px solid #374151; border-radius: 12px; color: white; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: #6366f1; }
        .btn { width: 100%; background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: auto; }
        .error-msg { color: #f87171; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
        
        /* Chat Dashboard */
        .chat-header { background: #030712; padding: 12px 16px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1f2937; }
        .bot-profile { display: flex; flex-direction: column; }
        .bot-name-tag { font-weight: 700; color: #f9fafb; font-size: 15px; }
        .bot-meta-tag { font-size: 11px; color: #818cf8; font-weight: 500; }
        .end-story-btn { font-size: 11px; background: #374151; color: #f3f4f6; padding: 6px 12px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
        .end-story-btn:hover { background: #991b1b; color: white; }
        
        .chat-messages { flex-grow: 1; background: #030712; border-radius: 16px; padding: 16px; overflow-y: auto; margin-bottom: 12px; border: 1px solid #1f2937; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .msg.bot { background: #1f2937; color: #e5e7eb; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.user { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input-area input { flex-grow: 1; }
        .send-btn { background: #4f46e5; border: none; color: white; padding: 0 18px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="lockScreen" class="screen active">
        <h1>🔒 Private Simulator</h1>
        <p class="subtitle">Enter access key to resume your active stories</p>
        <div class="form-group">
            <label>Access Password</label>
            <input type="password" id="passphraseInput" placeholder="Enter password...">
            <div id="loginError" class="error-msg">Verification failed. Access Denied.</div>
        </div>
        <button class="btn" onclick="checkPassword()">Unlock Space</button>
    </div>

    <div id="mainAppContent" class="screen">
        <h1>Companion Space</h1>
        <p class="subtitle">Your Private Persistent Universe</p>

        <div id="setupScreen" class="screen">
            <div class="form-group">
                <label>Character Name</label>
                <input type="text" id="botName" value="Zayn">
            </div>

            <div class="form-group">
                <label>Define Ethnicity / Background</label>
                <input type="text" id="botEthnicity" placeholder="e.g., South Asian, Mediterranean, Mixed Heritage...">
            </div>

            <div class="form-group">
                <label>Character Archetype & Dynamic</label>
                <select id="botArchetype">
                    <option value="friend">Close Friend from College (Supportive, Familiar)</option>
                    <option value="executive">Corporate Senior Executive (Sharp, Professional, Guarded)</option>
                    <option value="wanderer">Adventurous Field Traveler (Free-spirited, Insightful)</option>
                    <option value="confidant">Quiet Private Confidant (Calm, Deeply Devoted)</option>
                </select>
            </div>

            <button class="btn" onclick="startChat()">Initialize Reality</button>
        </div>

        <div id="chatScreen" class="screen">
            <div class="chat-header">
                <div class="bot-profile">
                    <div id="headerName" class="bot-name-tag">Companion</div>
                    <div id="headerMeta" class="bot-meta-tag">Background Profile</div>
                </div>
                <button class="end-story-btn" onclick="endStory()">End Story</button>
            </div>
            
            <div class="chat-messages" id="chatDisplay"></div>
            
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Type your multi-day reply...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const targetSecureHash = "39fe5fa4693cb5664be87271816e889020964fb02893f4cfb6387d85311096a6"; // Hash of "mydreams"

    function checkPassword() {
        const userInput = document.getElementById("passphraseInput").value.trim().toLowerCase();
        const computedHash = CryptoJS.SHA256(userInput).toString();

        if (computedHash === targetSecureHash) {
            document.getElementById("lockScreen").classList.remove("active");
            document.getElementById("mainAppContent").classList.add("active");
            
            // Check if there's a saved session running from yesterday or before
            if (localStorage.getItem("story_bot_saved_name")) {
                loadSavedChat();
            } else {
                document.getElementById("setupScreen").classList.add("active");
            }
        } else {
            document.getElementById("loginError").style.display = "block";
            document.getElementById("passphraseInput").value = "";
        }
    }

    let bot = { name: '', ethnicity: '', archetype: '' };

    // Deep conversational memory pools structured around realistic human behavior
    const conversationalMatrix = {
        friend: {
            greetings: ["*Leans against the coffee counter, waving you over with a familiar smile* \"Hey! I ordered your usual. It feels like it's been ages since we caught up properly. Sit down, tell me what's going on!\"", "*Checks watch and smiles warmly* \"There you are! I was just going over some old photos from our college days. Honestly, so much has changed, but I'm just glad we still make time for this.\""],
            replies: ["That makes total sense. Remember when we dealt with something similar back then? We got through it, and you'll handle this too.", "Honestly, I'm just happy to listen. Take your time, I'm not going anywhere.", "Haha, some things never change! That sounds exactly like something you'd do. What happened next?", "I'm right here with you. No matter how complicated things get, you know you can tell me anything, right?"]
        },
        executive: {
            greetings: ["*Closes a sleek laptop and slides a file aside, looking up attentively* \"I've cleared the rest of my schedule for the evening. No interruptions. Let's talk about what's really on your mind.\"", "*Loosens their formal jacket slightly, offering a rare, genuine smile* \"It's been an incredibly demanding week on the corporate floor, but stepping into this space with you makes the noise completely disappear. What are we focusing on today?\""],
            replies: ["An interesting perspective. It shows strategy, but let's look at how it impacts you emotionally.", "I deal with complex negotiations every day, but keeping things safe and clear between us is my highest priority.", "You carry yourself with a lot of weight. You don't have to be the strong one when you're talking to me.", "That's a bold move. I like it. Tell me exactly how you plan to follow through."]
        },
        wanderer: {
            greetings: ["*Adjusts a worn travel pack, dust on boots, eyes bright with excitement* \"You wouldn't believe the sunset I witnessed crossing the ridge yesterday. But honestly, the entire journey I was just looking forward to landing here and talking to you!\"", "*Sits cross-legged on the bench, holding up a small trinket* \"I picked this up at a local market along the coast. It reminded me of our conversations. I have so much to share with you!\""],
            replies: ["The world is vast, but it's these quiet moments right here that feel the most grounded.", "That sounds like a journey in itself. Sometimes the internal paths take longer to cross than oceans.", " Fascinating. It's beautiful how human experiences match up no matter where we live. Go on.", "Whatever horizon you choose next, you know I'm ready to walk it with you."]
        },
        confidant: {
            greetings: ["*Turns down the soft room lighting, giving you their complete, unwavering attention* \"I was hoping you'd check in today. This room is completely safe, and everything out there can wait. Take a deep breath and tell me how you are.\"", "*Pours a warm drink, sitting down close by with a calm demeanor* \"Your energy feels a bit heavy today. Remember, you don't have to explain anything perfectly. Just speak from the heart.\""],
            replies: ["I hear you, completely. Don't worry about how it sounds—just let the thoughts out.", "My presence here belongs entirely to you. Your trust is something I safeguard very carefully.", "That sounds incredibly deep. Let's sit with that feeling for a moment. What do you feel is the root cause?", "I'm right here. Your thoughts are safe with me, today, tomorrow, and whenever you need to return."]
        }
    };

    function startChat() {
        bot.name = document.getElementById('botName').value || 'Companion';
        bot.ethnicity = document.getElementById('botEthnicity').value || 'Global Heritage';
        bot.archetype = document.getElementById('botArchetype').value;

        // Lock values inside internal long-term local storage memory
        localStorage.setItem("story_bot_saved_name", bot.name);
        localStorage.setItem("story_bot_saved_ethnicity", bot.ethnicity);
        localStorage.setItem("story_bot_saved_archetype", bot.archetype);

        document.getElementById('headerName').innerText = bot.name;
        document.getElementById('headerMeta').innerText = `${bot.ethnicity} ✦ ${document.getElementById('botArchetype').options[document.getElementById('botArchetype').selectedIndex].text.split('(')[0]}`;
        
        document.getElementById('setupScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');

        // Pick a random realistic introduction sequence
        const pool = conversationalMatrix[bot.archetype].greetings;
        const starterGreeting = pool[Math.floor(Math.random() * pool.length)];

        const chatDisplay = document.getElementById('chatDisplay');
        chatDisplay.innerHTML = `<div class="msg bot">${starterGreeting}</div>`;
        
        // Save initial greeting to history log
        localStorage.setItem("story_bot_chat_history", chatDisplay.innerHTML);
    }

    function sendMessage() {
        const inputField = document.getElementById('userInput');
        const userText = inputField.value.trim();
        if (!userText) return;

        const chatDisplay = document.getElementById('chatDisplay');
        chatDisplay.innerHTML += `<div class="msg user">${inputField.value}</div>`;
        inputField.value = '';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        // Cache message history immediately
        localStorage.setItem("story_bot_chat_history", chatDisplay.innerHTML);

        // Simulate thoughtful real-time processing time delay
        setTimeout(() => {
            const currentArchetypePool = conversationalMatrix[bot.archetype].replies;
            const chosenResponse = currentArchetypePool[Math.floor(Math.random() * currentArchetypePool.length)];
            
            chatDisplay.innerHTML += `<div class="msg bot">${chosenResponse}</div>`;
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            
            // Re-cache conversation history to include the response
            localStorage.setItem("story_bot_chat_history", chatDisplay.innerHTML);
        }, 800);
    }

    function loadSavedChat() {
        bot.name = localStorage.getItem("story_bot_saved_name");
        bot.ethnicity = localStorage.getItem("story_bot_saved_ethnicity");
        bot.archetype = localStorage.getItem("story_bot_saved_archetype");

        document.getElementById('headerName').innerText = bot.name;
        document.getElementById('headerMeta').innerText = `${bot.ethnicity} ✦ Persistent Session`;
        
        document.getElementById('chatScreen').classList.add('active');
        const chatDisplay = document.getElementById('chatDisplay');
        chatDisplay.innerHTML = localStorage.getItem("story_bot_chat_history") || '';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    function endStory() {
        if (confirm("Are you sure you want to end this story arc? This will erase this specific bot's current chat memory history so you can create a brand new character profile.")) {
            // Wipe persistent browser cache clean
            localStorage.clear();
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('setupScreen').classList.add('active');
            document.getElementById('chatDisplay').innerHTML = '';
        }
    }

    // Bind Enter key to chat input box
    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
    // Bind Enter key to password screen
    document.getElementById('passphraseInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });
</script>

</body>
</html>
